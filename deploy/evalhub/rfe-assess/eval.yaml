skill: ""
execution:
  mode: case
  arguments: ""
  timeout: 120
runner:
  type: claude-code
  effort: low
dataset:
  path: cases
  schema: |
    Each case directory is named by RFE ID (e.g., RHAIRFE-2048).
    Contains input.yaml with rfe_id, title, and description fields.
outputs:
  - path: results
    schema: |
      result.md: RFE quality assessment with scoring table
      (WHAT/WHY/HOW/Task/Size, 0-2 each, /10 total),
      verdict (PASS/FAIL), and actionable feedback.
judges:
  - name: has_scoring_table
    description: Assessment contains complete scoring table with all 5 criteria
    check: |
      files = outputs.get("files", {})
      content = files.get("results/result.md", files.get("result.md", ""))
      if not content:
          return False, "No result.md found"
      required = ["WHAT", "WHY", "Open to HOW", "Not a task", "Right-sized", "Total"]
      missing = [r for r in required if r not in content]
      if missing:
          return False, f"Missing criteria: {missing}"
      return True, "All scoring criteria present"
  - name: has_verdict
    description: Assessment includes a verdict section with PASS or FAIL
    check: |
      files = outputs.get("files", {})
      content = files.get("results/result.md", files.get("result.md", ""))
      if "### Verdict" not in content:
          return False, "No Verdict section"
      if "PASS" not in content and "FAIL" not in content:
          return False, "No PASS/FAIL determination"
      return True, "Verdict present"
  - name: has_feedback
    description: Assessment includes feedback (required for FAIL, optional for PASS)
    check: |
      files = outputs.get("files", {})
      content = files.get("results/result.md", files.get("result.md", ""))
      if "FAIL" in content.split("**Total**")[1] if "**Total**" in content else "":
          if "### Feedback" not in content:
              return False, "FAIL verdict but no Feedback section"
      return True, "Feedback present or PASS verdict"
  - name: scores_valid
    description: All criterion scores are 0-2 and total is 0-10
    check: |
      import re
      files = outputs.get("files", {})
      content = files.get("results/result.md", files.get("result.md", ""))
      scores = re.findall(r'\|[*\s]*(\d)\s*/\s*2[*\s]*\|', content)
      if len(scores) < 5:
          return False, f"Found {len(scores)} scores, expected 5"
      for s in scores:
          if int(s) not in (0, 1, 2):
              return False, f"Invalid score: {s}/2"
      total_match = re.search(r'\*{0,2}(\d+)\s*/\s*10\*{0,2}', content)
      if not total_match:
          return False, "No total score found"
      total = int(total_match.group(1))
      if total != sum(int(s) for s in scores):
          return False, f"Total {total} != sum of scores {sum(int(s) for s in scores)}"
      return True, f"All scores valid, total={total}/10"
  - name: rubric_score
    description: Numeric RFE quality score (0-10) extracted from the assessment
    check: |
      import re
      files = outputs.get("files", {})
      content = files.get("results/result.md", files.get("result.md", ""))
      total_match = re.search(r'\*{0,2}(\d+)\s*/\s*10\*{0,2}', content)
      if not total_match:
          return 0, "No total score found"
      return int(total_match.group(1)), f"Rubric score: {total_match.group(1)}/10"
thresholds:
  has_scoring_table:
    min_pass_rate: 1.0
  has_verdict:
    min_pass_rate: 1.0
  has_feedback:
    min_pass_rate: 1.0
  scores_valid:
    min_pass_rate: 1.0
  rubric_score:
    min_mean: 7.0
